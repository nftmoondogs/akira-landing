<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AKIRA // Trailer</title>
  <meta name="description" content="Watch the official AKIRA NFT trailer — a cyberpunk anime saga.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Orbitron:wght@700;900&family=Space+Grotesk:wght@400;500;600;700&display=swap"
    rel="stylesheet">
</head>

<body>

  <script>
    // ╔═══════════════════════════════════════════════════════════════════╗
    // ║  🎬  TRAILER PAGE CONFIG — CHANGE EVERYTHING HERE               ║
    // ╚═══════════════════════════════════════════════════════════════════╝

    const CONFIG = {

      // — BRAND / TOP BAR —
      logoSrc: "assets/akira-logo-alt.png",  // ← top-left logo image
      logoAlt: "AKIRA",                         // ← logo alt text
      logoLink: "index.html",                    // ← where logo links to

      // — VIDEO —
      // Supported types:
      //   "twitter"  → embeds tweet with video player inline (plays on page)
      //   "youtube"  → "https://www.youtube.com/embed/VIDEO_ID"
      //   "mp4"      → "assets/trailer.mp4" (local file)
      videoType: "mp4",
      videoSrc: "assets/Akira NFT Trailer.mp4",  // ← local mp4 file
      videoTitle: "Akira // Genesis",              // ← title shown in top bar
      videoCreator: "Akira",                         // ← creator name under title

      // — BIG TITLE (below video) —
      bigTitle: "GENESIS",                       // ← the massive title text

      // — CHARACTER BADGES (right of title) —
      characters: [
        { name: "SHAO", subtitle: "AKIRA #187", img: "assets/nft-1.png" },
        { name: "RIZAN", subtitle: "AKIRA #131", img: "assets/nft-2.png" },
      ],

      // — SCENE THUMBNAILS (3-column grid) —
      scenes: [
        { img: "assets/placeholder-scene-1.png", title: "THE GATE", time: "00:00", scene: "SCENE 1" },
        { img: "assets/placeholder-scene-2.png", title: "GROWING UP", time: "00:15", scene: "SCENE 2" },
        { img: "assets/placeholder-scene-3.png", title: "THE MARKET", time: "00:28", scene: "SCENE 3" },
        { img: "assets/placeholder-scene-4.png", title: "THE SWORD", time: "00:43", scene: "SCENE 4" },
        { img: "assets/placeholder-scene-5.png", title: "THE SHADOWS", time: "00:54", scene: "SCENE 5" },
        { img: "assets/placeholder-scene-6.png", title: "MISSING", time: "01:13", scene: "SCENE 6" },
      ],

      // — COLORS —
      accentColor: "#ff2d78",                       // ← brand accent color
      sceneNumColor: "#c8ff00",                       // ← scene number color (lime)
      bgColor: "#0a0a0a",                       // ← page background
    };
  </script>

  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0a0a;
      color: #fff;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* CRT Scanline Overlay */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 9999;
      pointer-events: none;
      background: repeating-linear-gradient(0deg,
          rgba(0, 0, 0, 0.15) 0px,
          rgba(0, 0, 0, 0.15) 1px,
          transparent 1px,
          transparent 3px);
      mix-blend-mode: multiply;
    }

    /* ===== TOP BAR ===== */
    .trailer-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 40px;
      position: relative;
      z-index: 10;
    }

    .trailer-logo {
      height: 24px;
      cursor: pointer;
    }

    .trailer-topbar-center {
      display: flex;
      align-items: center;
      gap: 10px;
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
    }

    .trailer-topbar-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      object-fit: cover;
      background: #ff2d78;
      padding: 5px;
      filter: brightness(0) invert(1);
    }

    .trailer-topbar-info {
      display: flex;
      flex-direction: column;
    }

    .trailer-topbar-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 12px;
      font-weight: 600;
      color: #fff;
    }

    .trailer-topbar-creator {
      font-size: 10px;
      color: #666;
    }

    .trailer-topbar-icons {
      display: flex;
      gap: 14px;
      align-items: center;
    }

    .trailer-topbar-icons svg {
      width: 16px;
      height: 16px;
      color: #666;
      cursor: pointer;
      transition: color 0.2s;
    }

    .trailer-topbar-icons svg:hover {
      color: #fff;
    }

    /* ===== VIDEO PLAYER — FULL WIDTH ===== */
    .trailer-video-wrap {
      width: 100%;
      padding: 0 40px;
      margin: 0 auto;
    }

    .trailer-video-inner {
      width: 100%;
      aspect-ratio: 16/9;
      background: #000;
      border-radius: 2px;
      overflow: hidden;
      position: relative;
    }

    .trailer-video-inner iframe,
    .trailer-video-inner video {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* Twitter embed container */
    .trailer-video-inner .twitter-embed-wrap {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      overflow: hidden;
    }

    .trailer-video-inner .twitter-embed-wrap iframe {
      width: 100%;
      height: 100%;
      min-height: 500px;
    }

    /* ===== TITLE ROW — FULL WIDTH ===== */
    .trailer-title-section {
      padding: 32px 40px 40px;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
    }

    .trailer-big-title {
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: clamp(72px, 12vw, 160px);
      text-transform: uppercase;
      letter-spacing: -3px;
      line-height: 0.85;
      color: #fff;
    }

    .trailer-characters {
      display: flex;
      gap: 24px;
      align-items: center;
      padding-bottom: 12px;
    }

    .trailer-char {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .trailer-char-img {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #333;
    }

    .trailer-char-info {
      display: flex;
      flex-direction: column;
    }

    .trailer-char-name {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 12px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 1px;
    }

    .trailer-char-sub {
      font-size: 9px;
      color: #555;
      font-family: 'Space Grotesk', sans-serif;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    /* ===== SCENE GRID — FULL WIDTH ===== */
    .trailer-scenes {
      padding: 0 40px 80px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    .scene-card {
      position: relative;
      border-radius: 4px;
      overflow: hidden;
      background: #111;
      border: 1px solid #1a1a1a;
      cursor: pointer;
      transition: border-color 0.3s, transform 0.2s;
    }

    .scene-card:hover {
      border-color: #333;
      transform: translateY(-2px);
    }

    .scene-card img {
      width: 100%;
      aspect-ratio: 16/9;
      object-fit: cover;
      display: block;
      transition: opacity 0.3s;
    }

    .scene-card:hover img {
      opacity: 0.8;
    }

    .scene-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 12px;
    }

    .scene-meta-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .scene-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #999;
    }

    .scene-time {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 9px;
      color: #444;
    }

    .scene-sep {
      color: #333;
      font-size: 9px;
    }

    .scene-num {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* ===== BACK BUTTON ===== */
    .trailer-back {
      position: fixed;
      bottom: 28px;
      right: 28px;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 100;
      transition: background 0.3s, transform 0.2s;
      text-decoration: none;
    }

    .trailer-back:hover {
      background: rgba(255, 255, 255, 0.12);
      transform: scale(1.05);
    }

    .trailer-back svg {
      width: 18px;
      height: 18px;
      color: #fff;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 768px) {
      .trailer-topbar {
        padding: 12px 20px;
      }

      .trailer-topbar-center {
        display: none;
      }

      .trailer-video-wrap {
        padding: 0 16px;
      }

      .trailer-title-section {
        flex-direction: column;
        align-items: flex-start;
        gap: 16px;
        padding: 20px 16px 28px;
      }

      .trailer-scenes {
        padding: 0 16px 60px;
        grid-template-columns: repeat(2, 1fr);
        gap: 10px;
      }
    }

    @media (max-width: 480px) {
      .trailer-scenes {
        grid-template-columns: 1fr;
      }
    }
  </style>

  <div id="trailer-app"></div>

  <a href="index.html" class="trailer-back" title="Back to Home">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M19 12H5M12 19l-7-7 7-7" />
    </svg>
  </a>

  <script>
    // ===== ADMIN SYNC: Override CONFIG from Admin Panel =====
    (function(){
      var overrides = {
        'trailer_title': 'videoTitle',
        'trailer_big_title': 'bigTitle',
        'trailer_video_url': 'videoSrc'
      };
      for(var adminKey in overrides){
        var val = localStorage.getItem('akira_' + adminKey);
        if(val !== null) CONFIG[overrides[adminKey]] = val;
      }

      // Override Scenes
      for(let i=0; i<6; i++) {
        let titleVal = localStorage.getItem('akira_scene_' + (i+1) + '_title');
        let tagVal = localStorage.getItem('akira_scene_' + (i+1) + '_tag');
        if(titleVal !== null) CONFIG.scenes[i].title = titleVal;
        if(tagVal !== null) CONFIG.scenes[i].scene = tagVal;
      }
    })();

    // ===== BUILD PAGE FROM CONFIG =====
    document.body.style.background = CONFIG.bgColor;

    const app = document.getElementById('trailer-app');

    // — Video content —
    let videoHTML = '';
    // Extract YouTube video ID for thumbnail/fallback
    const ytMatch = CONFIG.videoSrc.match(/(?:embed\/|watch\?v=|youtu\.be\/)([\w-]+)/);
    const ytId = ytMatch ? ytMatch[1] : '';

    if (CONFIG.videoType === 'youtube') {
      videoHTML = `<iframe src="${CONFIG.videoSrc}?rel=0&modestbranding=1&showinfo=0&color=red&iv_load_policy=3&playsinline=1&fs=1" allowfullscreen allow="autoplay; encrypted-media; fullscreen; picture-in-picture" frameborder="0"></iframe>`;
    } else if (CONFIG.videoType === 'mp4') {
      videoHTML = `
        <div style="position:relative;width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:#000;">
          <video id="trailer-video-el" controls style="width:100%;height:100%;object-fit:cover;">
            <source src="${CONFIG.videoSrc}" type="video/mp4">
          </video>
          <div id="trailer-play-btn" style="position:absolute;width:80px;height:80px;background:rgba(255,0,0,0.9);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform 0.2s, opacity 0.2s;box-shadow:0 4px 30px rgba(255,0,0,0.4);" onmouseover="this.style.transform='scale(1.1)'" onmouseout="this.style.transform='scale(1)'">
            <svg viewBox="0 0 24 24" fill="#fff" width="36" height="36" style="margin-left:4px;"><polygon points="8 5 19 12 8 19"/></svg>
          </div>
        </div>
      `;
    } else if (CONFIG.videoType === 'twitter') {
      videoHTML = `<div class="twitter-embed-wrap">
      <iframe src="https://platform.twitter.com/embed/Tweet.html?id=${CONFIG.videoSrc}&theme=dark&dnt=true" 
        allowfullscreen allow="autoplay; encrypted-media; fullscreen"
        style="border:none; width:100%; height:100%;">
      </iframe>
    </div>`;
    }

    // — Characters —
    const charsHTML = CONFIG.characters.map(c => `
    <div class="trailer-char">
      <img src="${c.img}" alt="${c.name}" class="trailer-char-img">
      <div class="trailer-char-info">
        <span class="trailer-char-name">${c.name}</span>
        <span class="trailer-char-sub">${c.subtitle}</span>
      </div>
    </div>
  `).join('');

    // — Scenes —
    const scenesHTML = CONFIG.scenes.map(s => `
    <div class="scene-card">
      <img src="${s.img}" alt="${s.title}">
      <div class="scene-meta">
        <div class="scene-meta-left">
          <span class="scene-title">${s.title}</span>
          <span class="scene-sep">//</span>
          <span class="scene-time">${s.time}</span>
        </div>
        <span class="scene-num" style="color:${CONFIG.sceneNumColor}">${s.scene}</span>
      </div>
    </div>
  `).join('');

    // — Assemble —
    app.innerHTML = `
    <nav class="trailer-topbar">
      <a href="${CONFIG.logoLink}"><img src="${CONFIG.logoSrc}" alt="${CONFIG.logoAlt}" class="trailer-logo"></a>
      <div class="trailer-topbar-center">
        <img src="${CONFIG.logoSrc}" alt="" class="trailer-topbar-avatar">
        <div class="trailer-topbar-info">
          <span class="trailer-topbar-title">${CONFIG.videoTitle}</span>
          <span class="trailer-topbar-creator">${CONFIG.videoCreator}</span>
        </div>
      </div>
      <div class="trailer-topbar-icons">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15.536 8.464a5 5 0 010 7.072M18.364 5.636a9 9 0 010 12.728M6 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h2l4-4v14l-4-4z"/></svg>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
      </div>
    </nav>

    <div class="trailer-video-wrap">
      <div class="trailer-video-inner">
        ${videoHTML}
      </div>
    </div>

    <div class="trailer-title-section">
      <h1 class="trailer-big-title">${CONFIG.bigTitle}</h1>
      <div class="trailer-characters">${charsHTML}</div>
    </div>

    <div class="trailer-scenes">${scenesHTML}</div>
  `;

    // ===== ATTACH VIDEO EVENTS =====
    if (CONFIG.videoType === 'mp4') {
      const vid = document.getElementById('trailer-video-el');
      const playBtn = document.getElementById('trailer-play-btn');
      if (vid && playBtn) {
        playBtn.addEventListener('click', () => {
          vid.play();
        });
        vid.addEventListener('play', () => {
          playBtn.style.opacity = '0';
          playBtn.style.pointerEvents = 'none';
        });
        vid.addEventListener('pause', () => {
          playBtn.style.opacity = '1';
          playBtn.style.pointerEvents = 'auto';
        });
      }
    }
  </script>

</body>

</html>
