<!DOCTYPE html>

  <meta name="description" content="AKIRA is coming. A premium cyberpunk NFT collection forged in the neon glow of Neo-Tokyo.">
  <link rel="stylesheet" href="style.css">
  <style>
    /* ===== COMING SOON OVERRIDES ===== */

    /* Use independent background image — swap this file to change */
    .coming-soon-page .hero-bg {
      background-image: url('assets/coming-soon-bg.png') !important;
    }

    /* Center the title vertically in full viewport */
    .coming-soon-page .hero {
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .coming-soon-page .hero-content {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Make the title bigger for impact */
    .coming-soon-page .hero-title {
      font-size: clamp(52px, 8vw, 120px);
      letter-spacing: 6px;
      line-height: 1.1;
    }

    /* Subtle pulsing glow on the accent line */
    .coming-soon-page .hero-title .accent {
      animation: comingSoonPulse 3s ease-in-out infinite;
    }

    @keyframes comingSoonPulse {
      0%, 100% { filter: drop-shadow(0 0 30px rgba(0, 240, 255, 0.3)); }
      50% { filter: drop-shadow(0 0 60px rgba(255, 45, 120, 0.5)) drop-shadow(0 0 100px rgba(0, 240, 255, 0.2)); }
    }
  </style>
</head>

<nav class="nav-topbar" id="nav-topbar">
